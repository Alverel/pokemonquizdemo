version: '3.9'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pokemon
      POSTGRES_PASSWORD: pokemon
      POSTGRES_DB: pokemonquiz
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql://pokemon:pokemon@db:5432/pokemonquiz
      PORT: 3001
    ports:
      - '3001:3001'
    depends_on:
      - db

volumes:
  postgres_data:
